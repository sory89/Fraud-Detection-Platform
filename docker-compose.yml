services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: fraud-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       fraud
      POSTGRES_USER:     fraud
      POSTGRES_PASSWORD: fraud
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fraud"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: fraud-redis
    restart: unless-stopped
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Kafka (KRaft, no Zookeeper) ─────────────────────────────────────────────
  kafka:
    image: apache/kafka:3.7.0
    container_name: fraud-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 4
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_RETENTION_HOURS: 24
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 30s

  # ── ML Model Training (runs once, then exits) ────────────────────────────────
  ml-train:
    build: ./ml
    container_name: fraud-ml-train
    volumes:
      - models:/models
    environment:
      MODEL_PATH:  "/models/fraud_model.pkl"
      N_SAMPLES:   "50000"
    restart: "no"

  # ── Payment Producer ─────────────────────────────────────────────────────────
  producer-payment:
    build: ./producers/payment
    container_name: fraud-producer-payment
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP:  "kafka:9092"
      TOPIC:            "transactions.payments"
      INTERVAL_SECONDS: "0.5"
      BATCH_SIZE:       "5"

  # ── CDC Producer ─────────────────────────────────────────────────────────────
  producer-cdc:
    build: ./producers/cdc
    container_name: fraud-producer-cdc
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP:  "kafka:9092"
      TOPIC:            "transactions.cdc"
      INTERVAL_SECONDS: "2"

  # ── Flink Fraud Pipeline ─────────────────────────────────────────────────────
  flink:
    build: ./flink
    container_name: fraud-flink
    restart: on-failure
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP:  "kafka:9092"
      TOPIC_PAYMENTS:   "transactions.payments"
      TOPIC_CDC:        "transactions.cdc"
      TOPIC_DECISIONS:  "fraud.decisions"
      TOPIC_ALERTS:     "fraud.alerts"
      TOPIC_DLQ:        "fraud.dlq"

  # ── Feature Store ────────────────────────────────────────────────────────────
  feature-store:
    build: ./feature_store
    container_name: fraud-feature-store
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP:  "kafka:9092"
      REDIS_URL:        "redis://redis:6379/0"
      DB_DSN:           "host=postgres port=5432 dbname=fraud user=fraud password=fraud"
      TOPIC_PAYMENTS:   "transactions.payments"
      TOPIC_DECISIONS:  "fraud.decisions"
      TOPIC_ALERTS:     "fraud.alerts"
      FEATURE_TTL:      "86400"

  # ── Fraud Decision API ───────────────────────────────────────────────────────
  api:
    build: ./api
    container_name: fraud-api
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - models:/models:ro
    environment:
      REDIS_URL:   "redis://redis:6379/0"
      MODEL_PATH:  "/models/fraud_model.pkl"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Prometheus ───────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: fraud-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheusdata:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=7d
      - --web.enable-lifecycle

  # ── Grafana ──────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: fraud-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER:     admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED:  "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - grafanadata:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

  # ── Redis Exporter (for Prometheus) ──────────────────────────────────────────
  redis-exporter:
    image: oliver006/redis_exporter:v1.58.0
    container_name: fraud-redis-exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: "redis://redis:6379"
    ports:
      - "9121:9121"
    depends_on:
      redis:
        condition: service_healthy

  # ── Postgres Exporter (for Prometheus) ───────────────────────────────────────
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: fraud-postgres-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://fraud:fraud@postgres:5432/fraud?sslmode=disable"
    ports:
      - "9187:9187"
    depends_on:
      postgres:
        condition: service_healthy


  # ── Streamlit Dashboard ──────────────────────────────────────────────────────
  streamlit:
    build: ./streamlit
    container_name: fraud-streamlit
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
    ports:
      - "8501:8501"
    environment:
      DB_DSN:    "host=postgres port=5432 dbname=fraud user=fraud password=fraud"
      REDIS_URL: "redis://redis:6379/0"
      API_BASE:  "http://api:8000"

volumes:
  pgdata:
  redisdata:
  models:
  prometheusdata:
  grafanadata:
