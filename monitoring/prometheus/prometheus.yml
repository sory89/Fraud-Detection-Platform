global:
  scrape_interval:     10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: "fraud-api"
    static_configs:
      - targets: ["api:8000"]
    metrics_path: /metrics

  - job_name: "kafka"
    static_configs:
      - targets: ["kafka:9092"]

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]
